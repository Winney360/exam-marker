services:
  - type: web
    name: rio-backend
    env: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: rio-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: OCR_SERVICE_URL
        value: http://rio-ocr:5001
      - key: SERVER_ADDR
        value: 0.0.0.0
      - key: SERVER_PORT
        value: 3000
      - key: UPLOAD_DIR
        value: /data/uploads

  - type: web
    name: rio-ocr
    env: docker
    dockerfilePath: ./ocr-service/Dockerfile
    envVars:
      - key: PORT
        value: 5001

databases:
  - name: rio-db
    databaseName: rio
    plan: free
